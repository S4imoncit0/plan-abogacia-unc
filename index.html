<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Plan de estudios - Abogacía UNC</title>

<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="header-top">

<h1>⚖️ Plan de estudios - Abogacía UNC</h1>

<button id="toggle-theme">🌙</button>

</div>

<div class="timeline">
<span>1° Año</span>
<span>2° Año</span>
<span>3° Año</span>
<span>4° Año</span>
<span>5° Año</span>
</div>

<p>Click en una materia para cambiar su estado</p>

<div class="progreso-container">
<div id="progreso-barra"></div>
</div>

<p id="progreso-texto"></p>

<div id="progreso-por-anio"></div>

<div class="filtros">
<button data-anio="all">Todos</button>
<button data-anio="1">1° Año</button>
<button data-anio="2">2° Año</button>
<button data-anio="3">3° Año</button>
<button data-anio="4">4° Año</button>
<button data-anio="5">5° Año</button>
</div>

<details id="materias-disponibles">
<summary>📚 Materias que podés cursar ahora</summary>
<ul id="lista-disponibles"></ul>
</details>

<div id="cy"></div>

</div>

<script src="data/materias.js"></script>
<script src="js/script.js"></script>

<script>

/* TOGGLE DARK MODE */

const btn = document.getElementById("toggle-theme");

btn.addEventListener("click", () => {

document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")){
btn.textContent="☀️";
}else{
btn.textContent="🌙";
}

});

</script>

</body>

</html>
